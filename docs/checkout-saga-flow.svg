<svg width="1280" height="520" viewBox="0 0 1280 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#334155"/></marker>
    <style>
      .title{font:700 26px Arial,sans-serif;fill:#0f172a}.label{font:700 16px Arial,sans-serif;fill:#1e293b}.small{font:500 13px Arial,sans-serif;fill:#475569}.panel{fill:#fff;stroke:#0f172a;stroke-width:2}.svc{fill:#fffdf2;stroke:#eab308;stroke-width:2.5}.queue{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2.5}.ok{fill:#f0fdf4;stroke:#16a34a;stroke-width:2.5}.fail{fill:#fef2f2;stroke:#ef4444;stroke-width:2.5}.line{stroke:#334155;stroke-width:2.4;marker-end:url(#arrow)}.event{stroke:#ef4444;stroke-width:2.7;stroke-dasharray:8 7;marker-end:url(#arrow)}.green{stroke:#16a34a;stroke-width:2.7;marker-end:url(#arrow)}.red{stroke:#ef4444;stroke-width:2.7;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1280" height="520" fill="#fff"/>
  <text x="44" y="48" class="title">Checkout Saga Akışı</text>
  <rect x="42" y="82" width="1196" height="330" rx="24" class="panel"/>

  <rect x="82" y="224" width="125" height="68" rx="15" class="svc"/><text x="113" y="253" class="label">Client</text><text x="105" y="274" class="small">checkout</text>
  <rect x="270" y="224" width="135" height="68" rx="15" class="svc"/><text x="312" y="253" class="label">Order</text><text x="294" y="274" class="small">create order</text>
  <rect x="270" y="124" width="135" height="58" rx="14" class="svc"/><text x="314" y="149" class="label">Cart</text><text x="297" y="169" class="small">read basket</text>
  <rect x="490" y="224" width="135" height="68" rx="15" class="queue"/><text x="528" y="253" class="label">RabbitMQ</text><text x="509" y="274" class="small">OrderCreated</text>
  <rect x="710" y="124" width="135" height="68" rx="15" class="svc"/><text x="747" y="153" class="label">Product</text><text x="735" y="174" class="small">reserve stock</text>
  <rect x="710" y="224" width="135" height="68" rx="15" class="svc"/><text x="746" y="253" class="label">Payment</text><text x="751" y="274" class="small">pay order</text>
  <rect x="710" y="324" width="135" height="58" rx="14" class="svc"/><text x="721" y="349" class="label">Notification</text><text x="746" y="369" class="small">notify</text>
  <rect x="980" y="140" width="145" height="68" rx="15" class="ok"/><text x="1014" y="169" class="label">Success</text><text x="1004" y="190" class="small">confirm order</text>
  <rect x="980" y="300" width="145" height="68" rx="15" class="fail"/><text x="1025" y="329" class="label">Fail</text><text x="1002" y="350" class="small">compensate</text>

  <line x1="207" y1="258" x2="270" y2="258" class="line"/>
  <line x1="338" y1="224" x2="338" y2="182" class="line"/>
  <line x1="405" y1="258" x2="490" y2="258" class="event"/>
  <line x1="625" y1="248" x2="710" y2="158" class="event"/>
  <line x1="845" y1="158" x2="980" y2="174" class="green"/>
  <line x1="845" y1="258" x2="980" y2="174" class="green"/>
  <line x1="845" y1="178" x2="980" y2="334" class="red"/>
  <line x1="845" y1="278" x2="980" y2="334" class="red"/>
  <line x1="980" y1="188" x2="845" y2="353" class="event"/>
  <line x1="980" y1="334" x2="405" y2="292" class="event"/>

  <text x="72" y="386" class="small">Başarı: stok rezerve edilir, ödeme alınır, sipariş onaylanır, sepet temizlenir ve bildirim üretilir. Hata: sipariş başarısız/iptal edilir ve telafi eventleri çalışır.</text>
</svg>
