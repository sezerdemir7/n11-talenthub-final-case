<svg width="1280" height="620" viewBox="0 0 1280 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#334155"/></marker>
    <style>.title{font:700 26px Arial,sans-serif;fill:#0f172a}.label{font:700 16px Arial,sans-serif;fill:#1e293b}.small{font:500 13px Arial,sans-serif;fill:#475569}.box{fill:#fff;stroke:#0f172a;stroke-width:2}.svc{fill:#fffdf2;stroke:#eab308;stroke-width:2.5}.queue{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2.5}.fail{fill:#fef2f2;stroke:#ef4444;stroke-width:2.5}.ok{fill:#f0fdf4;stroke:#16a34a;stroke-width:2.5}.line{stroke:#334155;stroke-width:2.4;marker-end:url(#arrow)}.event{stroke:#ef4444;stroke-width:2.7;stroke-dasharray:8 7;marker-end:url(#arrow)}.green{stroke:#16a34a;stroke-width:2.7;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1280" height="620" fill="#fff"/>
  <text x="44" y="48" class="title">Telafi ve Satıcı Durum Event Akışları</text>
