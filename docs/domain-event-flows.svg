  <rect x="316" y="354" width="128" height="66" rx="14" class="queue"/><text x="344" y="394" class="label">RabbitMQ</text>
  <rect x="524" y="314" width="150" height="66" rx="14" class="svc"/><text x="548" y="344" class="label">Product</text><text x="540" y="364" class="small">restore stock</text>
