<svg width="1400" height="820" viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#222"/>
    </marker>
    <marker id="redArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#ef4444"/>
    </marker>
    <style>
      .title{font:700 30px Arial,sans-serif;fill:#0f172a}
      .small{font:500 14px Arial,sans-serif;fill:#475569}
      .label{font:700 16px Arial,sans-serif;fill:#1f2937}
      .hand{font:600 15px "Comic Sans MS","Segoe Print",Arial,sans-serif;fill:#ef4444}
      .handDark{font:600 15px "Comic Sans MS","Segoe Print",Arial,sans-serif;fill:#334155}
      .panel{fill:#fff;stroke:#111;stroke-width:2.2}
      .service{fill:#fffef2;stroke:#facc15;stroke-width:2.6}
      .infra{fill:#f8fafc;stroke:#38bdf8;stroke-width:2.4}
      .db{fill:#dbeafe;stroke:#2563eb;stroke-width:2.6}
      .queue{fill:#f5f3ff;stroke:#0ea5e9;stroke-width:2.6}
      .obs{fill:#f0fdf4;stroke:#16a34a;stroke-width:2.4}
      .external{fill:#fff7ed;stroke:#fb923c;stroke-width:2.4}
      .line{stroke:#222;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .both{stroke:#222;stroke-width:2.2;fill:none;marker-start:url(#arrow);marker-end:url(#arrow)}
      .event{stroke:#ef4444;stroke-width:2.4;fill:none;stroke-dasharray:7 6;marker-end:url(#redArrow)}
      .log{stroke:#16a34a;stroke-width:2.2;fill:none;stroke-dasharray:6 6;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1400" height="820" fill="#fff"/>
  <line x1="34" y1="10" x2="1366" y2="10" stroke="#cbd5e1"/>
  <text x="34" y="70" class="title">Process Chart of All Backend Services</text>

  <!-- Frontend browser icon -->
  <g>
    <rect x="74" y="315" width="112" height="104" rx="8" fill="#fff" stroke="#000" stroke-width="7"/>
    <rect x="74" y="315" width="112" height="28" rx="8" fill="#e5e7eb" stroke="#000" stroke-width="0"/>
    <circle cx="105" cy="329" r="3.5" fill="#000"/>
    <circle cx="124" cy="329" r="3.5" fill="#000"/>
    <circle cx="143" cy="329" r="3.5" fill="#000"/>
    <text x="98" y="385" font-family="monospace" font-size="42" font-weight="800" fill="#000">&lt;/&gt;</text>
    <text x="91" y="445" class="handDark">Frontend</text>
  </g>

  <path d="M224 358 C260 350 284 350 318 358" class="both"/>
  <text x="235" y="335" class="handDark">HTTP requests</text>

  <!-- Main backend/docker frame -->
  <rect x="350" y="110" width="948" height="610" rx="24" class="panel"/>
  <text x="1192" y="160" font-family="Arial,sans-serif" font-size="26" font-weight="800" fill="#0ea5e9">Docker</text>
  <path d="M1210 176 h68 v16 h-68z" fill="#38bdf8"/>
  <path d="M1220 158h12v12h-12z M1236 158h12v12h-12z M1252 158h12v12h-12z M1236 142h12v12h-12z M1252 142h12v12h-12z" fill="#0ea5e9"/>
  <path d="M1204 192 c20 22 58 21 78 0 c-22 8-56 8-78 0z" fill="#0284c7"/>

  <!-- Infra left -->
  <rect x="390" y="145" width="138" height="66" rx="14" class="infra"/>
  <text x="420" y="173" class="label">Config</text>
  <text x="413" y="194" class="small">Server 8762</text>

  <rect x="390" y="230" width="138" height="66" rx="14" class="infra"/>
  <text x="420" y="258" class="label">Eureka</text>
  <text x="402" y="279" class="small">Discovery 8761</text>

  <rect x="390" y="332" width="138" height="78" rx="15" class="infra"/>
  <text x="415" y="365" class="label">API Gateway</text>
  <text x="428" y="388" class="small">8763</text>

  <!-- Service column -->
  <rect x="612" y="145" width="145" height="76" rx="16" class="service"/>
