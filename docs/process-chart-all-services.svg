  <text x="639" y="304" class="small">Catalog / Stock</text>

  <rect x="612" y="355" width="145" height="76" rx="16" class="service"/>
  <text x="656" y="387" class="label">Cart</text>
  <text x="650" y="409" class="small">Basket</text>

  <rect x="612" y="460" width="145" height="76" rx="16" class="service"/>
  <text x="649" y="492" class="label">Order</text>
  <text x="644" y="514" class="small">Checkout</text>

  <rect x="612" y="565" width="145" height="76" rx="16" class="service"/>
  <text x="639" y="597" class="label">Payment</text>
  <text x="650" y="619" class="small">Iyzico</text>

  <rect x="820" y="460" width="160" height="76" rx="16" class="service"/>
  <text x="842" y="492" class="label">Notification</text>
  <text x="866" y="514" class="small">WebSocket</text>

  <!-- DB top -->
  <g>
    <ellipse cx="880" cy="160" rx="56" ry="18" class="db"/>
    <rect x="824" y="160" width="112" height="58" fill="#dbeafe" stroke="#2563eb" stroke-width="2.6"/>
    <ellipse cx="880" cy="218" rx="56" ry="18" class="db"/>
    <text x="838" y="254" class="handDark">PostgreSQL</text>
    <text x="828" y="275" class="small">service databases</text>
  </g>

  <!-- RabbitMQ center right -->
  <rect x="835" y="290" width="86" height="300" rx="22" class="queue"/>
  <text x="845" y="440" class="label" transform="rotate(-90 845 440)">RabbitMQ</text>
  <text x="808" y="626" class="handDark">saga exchange</text>

