  <rect x="1035" y="348" width="98" height="88" rx="17" class="obs"/>
  <text x="1058" y="386" class="label">Logs</text>
  <text x="1053" y="409" class="small">Promtail</text>

  <g>
    <ellipse cx="1210" cy="360" rx="45" ry="15" class="db"/>
    <rect x="1165" y="360" width="90" height="48" fill="#dbeafe" stroke="#2563eb" stroke-width="2.6"/>
    <ellipse cx="1210" cy="408" rx="45" ry="15" class="db"/>
    <text x="1182" y="444" class="handDark">Loki</text>
  </g>

  <rect x="1135" y="535" width="118" height="66" rx="15" class="obs"/>
  <text x="1164" y="564" class="label">Grafana</text>
  <text x="1174" y="585" class="small">3000</text>

  <!-- External -->
  <rect x="1018" y="145" width="110" height="62" rx="15" class="external"/>
  <text x="1055" y="172" class="label">S3</text>
  <text x="1038" y="193" class="small">images</text>

  <rect x="1018" y="620" width="110" height="62" rx="15" class="external"/>
  <text x="1046" y="647" class="label">Iyzico</text>
  <text x="1042" y="668" class="small">payment</text>

  <!-- Gateway to services -->
  <path d="M528 371 C568 230 570 184 612 183" class="line"/>
  <path d="M528 371 C568 286 576 288 612 288" class="line"/>
  <path d="M528 371 C565 392 576 393 612 393" class="line"/>
  <path d="M528 371 C570 485 575 498 612 498" class="line"/>
  <path d="M528 371 C565 575 575 603 612 603" class="line"/>
  <text x="426" y="445" class="hand">JWT check</text>
  <text x="426" y="466" class="hand">route to service</text>

  <!-- config/eureka arrows -->
  <path d="M459 332 L459 296" class="line"/>
  <path d="M459 332 C455 265 455 225 459 211" class="line"/>

  <!-- DB arrows -->
  <path d="M757 183 C795 173 803 171 824 171" class="line"/>
  <path d="M757 288 C793 238 807 213 824 205" class="line"/>
  <path d="M757 393 C792 318 805 255 824 220" class="line"/>
  <path d="M757 498 C798 390 807 285 824 230" class="line"/>
  <path d="M757 603 C806 455 818 304 824 238" class="line"/>
  <text x="775" y="126" class="hand">CRUD and</text>
  <text x="775" y="146" class="hand">domain data</text>

  <!-- Events -->
  <path d="M757 183 C792 238 810 286 835 314" class="event"/>
  <path d="M757 288 C792 304 810 318 835 338" class="event"/>
  <path d="M757 498 C795 454 811 418 835 390" class="event"/>
  <path d="M757 603 C795 526 812 468 835 430" class="event"/>
  <path d="M921 392 C966 392 995 392 1035 392" class="event"/>
  <text x="702" y="350" class="hand">publish / consume</text>
  <text x="702" y="370" class="hand">order, stock, payment</text>
  <text x="702" y="390" class="hand">seller events</text>

  <!-- Notification -->
  <path d="M921 496 C961 468 998 434 1035 410" class="event"/>
  <path d="M980 498 C1036 506 1088 545 1135 568" class="line"/>

  <!-- Logs -->
  <path d="M757 183 C868 236 942 306 1035 374" class="log"/>
  <path d="M757 288 C864 306 944 345 1035 388" class="log"/>
  <path d="M757 498 C858 466 944 425 1035 402" class="log"/>
  <path d="M1133 392 C1150 392 1155 392 1165 392" class="line"/>
  <path d="M1210 423 C1210 470 1210 500 1194 535" class="line"/>
  <text x="950" y="315" class="hand">central logs</text>
  <text x="950" y="335" class="hand">correlation id</text>

  <!-- External arrows -->
  <path d="M757 288 C874 244 945 195 1018 176" class="line"/>
  <path d="M757 603 C862 633 945 651 1018 651" class="line"/>

  <!-- Frontend to gateway line reaches panel -->
  <path d="M318 358 C333 358 337 358 350 358" class="line"/>
</svg>
