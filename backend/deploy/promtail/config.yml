server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: ecommerce-services
    static_configs:
      - targets:
          - localhost
        labels:
          job: ecommerce-services
          service: api-gateway
          __path__: /var/log/ecommerce/api-gateway/*.log
      - targets:
          - localhost
        labels:
          job: ecommerce-services
          service: cart-service
          __path__: /var/log/ecommerce/cart-service/*.log
      - targets:
          - localhost
        labels:
          job: ecommerce-services
          service: config-server
          __path__: /var/log/ecommerce/config-server/*.log
      - targets:
          - localhost
        labels:
          job: ecommerce-services
          service: discovery-server
          __path__: /var/log/ecommerce/discovery-server/*.log
      - targets:
          - localhost
        labels:
          job: ecommerce-services
          service: order-service
          __path__: /var/log/ecommerce/order-service/*.log
      - targets:
          - localhost
        labels:
          job: ecommerce-services
          service: payment-service
          __path__: /var/log/ecommerce/payment-service/*.log
      - targets:
          - localhost
        labels:
          job: ecommerce-services
          service: product-service
          __path__: /var/log/ecommerce/product-service/*.log
      - targets:
          - localhost
        labels:
          job: ecommerce-services
          service: user-service
          __path__: /var/log/ecommerce/user-service/*.log
