services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ecommerce_user_service
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ecommerce_user_service"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-init:
    image: postgres:16-alpine
    container_name: ecommerce-postgres-init
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    command:
      - sh
      - -c
      - |
        set -e
        for db in ecommerce_user_service ecommerce_product_service ecommerce_cart_service ecommerce_order_service ecommerce_payment_service; do
          if ! psql -h postgres -U "$${POSTGRES_USER}" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = '$${db}'" | grep -q 1; then
            psql -h postgres -U "$${POSTGRES_USER}" -d postgres -c "CREATE DATABASE $${db}"
          fi
        done

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ecommerce-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "127.0.0.1:5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  discovery-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: discovery-server
    container_name: ecommerce-discovery-server
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_HOSTNAME: discovery-server
      CONFIG_ENABLED: "false"
    volumes:
      - ./logs:/app/logs
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  config-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: config-server
    container_name: ecommerce-config-server
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_URI: http://discovery-server:8761/eureka/
      CONFIG_GIT_URI: ${CONFIG_GIT_URI}
      CONFIG_GIT_BRANCH: ${CONFIG_GIT_BRANCH}
      GIT_USERNAME: ${GIT_USERNAME}
      GIT_TOKEN: ${GIT_TOKEN}
    volumes:
      - ./logs:/app/logs
    ports:
      - "8762:8762"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8762/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: user-service
    container_name: ecommerce-user-service
    restart: unless-stopped
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CONFIG_URI: http://config-server:8762
      EUREKA_URI: http://discovery-server:8761/eureka
      DB_URL: jdbc:postgresql://postgres:5432/ecommerce_user_service
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      JWT_KEY: ${JWT_KEY}
      JWT_ISSUER_URI: ${JWT_ISSUER_URI}
      JWT_CLIENT_SECRET: ${JWT_CLIENT_SECRET}
      SERVER_PORT: 8764
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8764/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 60s

  product-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: product-service
    container_name: ecommerce-product-service
    restart: unless-stopped
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CONFIG_URI: http://config-server:8762
      EUREKA_URI: http://discovery-server:8761/eureka
      DB_URL: jdbc:postgresql://postgres:5432/ecommerce_product_service
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      SERVER_PORT: 8767
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8767/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 60s

  cart-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: cart-service
    container_name: ecommerce-cart-service
    restart: unless-stopped
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CONFIG_URI: http://config-server:8762
      EUREKA_URI: http://discovery-server:8761/eureka
      DB_URL: jdbc:postgresql://postgres:5432/ecommerce_cart_service
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SERVER_PORT: 8768
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8768/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 60s

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: order-service
    container_name: ecommerce-order-service
    restart: unless-stopped
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CONFIG_URI: http://config-server:8762
      EUREKA_URI: http://discovery-server:8761/eureka
      DB_URL: jdbc:postgresql://postgres:5432/ecommerce_order_service
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SERVER_PORT: 8769
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8769/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 60s

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: payment-service
    container_name: ecommerce-payment-service
    restart: unless-stopped
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CONFIG_URI: http://config-server:8762
      EUREKA_URI: http://discovery-server:8761/eureka
      DB_URL: jdbc:postgresql://postgres:5432/ecommerce_payment_service
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      IYZICO_API_KEY: ${IYZICO_API_KEY}
      IYZICO_SECRET_KEY: ${IYZICO_SECRET_KEY}
      IYZICO_BASE_URL: ${IYZICO_BASE_URL}
      SERVER_PORT: 8770
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8770/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 60s

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    container_name: ecommerce-api-gateway
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CONFIG_URI: http://config-server:8762
      EUREKA_URI: http://discovery-server:8761/eureka
      JWT_KEY: ${JWT_KEY}
      SERVER_PORT: 8763
    volumes:
      - ./logs:/app/logs
    ports:
      - "8763:8763"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8763/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 60s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_APP_NAME: ${VITE_APP_NAME:-N11 Marketplace}
    container_name: ecommerce-frontend
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"

  loki:
    image: grafana/loki:2.9.8
    container_name: ecommerce-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yml
    volumes:
      - ./deploy/loki:/etc/loki:ro
      - loki_data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:2.9.8
    container_name: ecommerce-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    volumes:
      - ./deploy/promtail:/etc/promtail:ro
      - ./logs:/var/log/ecommerce:ro

  grafana:
    image: grafana/grafana:10.4.14
    container_name: ecommerce-grafana
    restart: unless-stopped
    depends_on:
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  rabbitmq_data:
  loki_data:
  grafana_data:
