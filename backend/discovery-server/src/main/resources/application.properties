spring.application.name=discovery-server
server.port=8761

# Eureka Server kendisini registry'ye kaydetmez
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Local/Docker uyumlu hostname
eureka.instance.hostname=${EUREKA_HOSTNAME:localhost}

# Config Server opsiyonel
spring.cloud.config.enabled=${CONFIG_ENABLED:false}
spring.config.import=optional:configserver:${CONFIG_URI:http://localhost:8762}

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.health.probes.enabled=true
management.endpoint.health.probes.enabled=true